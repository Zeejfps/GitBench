name: release

# Push a SemVer tag (e.g. v1.2.3) to build + publish a release for every platform.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write          # the publish job uses GITHUB_TOKEN to create/attach release assets

jobs:
  # Build + Velopack-pack each platform on its own runner (Native AOT can't cross-compile),
  # then hand the packaged output to the publish job as an artifact. No job touches GitHub
  # Releases here, so the matrix jobs never race over who creates the release.
  build:
    strategy:
      fail-fast: false     # one platform failing shouldn't abandon the others
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            channel: win-x64
            exe: GitBench.exe
            icon: GitBench/Assets/commit_bench_icon.ico
            extra: ""
          - os: macos-latest          # Apple Silicon runner
            rid: osx-arm64
            channel: osx-arm64
            exe: GitBench
            icon: GitBench/Assets/commit_bench_icon_mac.icns
            extra: "--bundleId com.gitbench.app"
          # Intel macOS runners (macos-13) are queue-constrained and were stalling. Re-enable
          # this row (and add osx-x64 back to the publish loop below) to ship Intel builds.
          # - os: macos-13               # Intel runner
          #   rid: osx-x64
          #   channel: osx-x64
          #   exe: GitBench
          #   icon: GitBench/Assets/commit_bench_icon_mac.icns
          #   extra: "--bundleId com.gitbench.app"
          - os: ubuntu-latest
            rid: linux-x64
            channel: linux-x64
            exe: GitBench
            icon: GitBench/Assets/commit_bench_icon.png
            extra: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # .gitmodules points at the framework over SSH, but the repo is public — rewrite to
      # HTTPS so the default runner credentials can clone it (no deploy key needed).
      - name: Init public submodule over HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Ensure global tools on PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install vpk
        shell: bash
        run: dotnet tool install -g vpk

      - name: Compute version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"   # v1.2.3 -> 1.2.3

      # vpk pack --icon requires an .icns on macOS; convert the PNG with sips/iconutil
      # (same logic local .app builds use). Windows (.ico) and Linux (.png) need no conversion.
      - name: Generate macOS .icns
        if: runner.os == 'macOS'
        shell: bash
        run: bash GitBench/png-to-icns.sh GitBench/Assets/commit_bench_icon_mac.png GitBench/Assets/commit_bench_icon_mac.icns

      - name: Publish (Native AOT, per-RID)
        shell: bash
        run: >
          dotnet publish GitBench/GitBench.csproj
          -c Release -r ${{ matrix.rid }}
          -p:BuildMacBundle=false
          -o publish/${{ matrix.rid }}

      # Pull this channel's prior release so vpk can build delta packages. The first release
      # for a channel has nothing to download, so don't fail the job.
      - name: Download prior release (for deltas)
        shell: bash
        continue-on-error: true
        run: >
          vpk download github
          --repoUrl https://github.com/Zeejfps/GitBench
          --channel ${{ matrix.channel }}
          --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        shell: bash
        run: >
          vpk pack
          --packId GitBench
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/${{ matrix.rid }}
          --mainExe ${{ matrix.exe }}
          --packTitle GitBench
          --packAuthors Zeejfps
          --channel ${{ matrix.channel }}
          --runtime ${{ matrix.rid }}
          --icon ${{ matrix.icon }}
          ${{ matrix.extra }}

      # vpk writes per-channel asset names, so the four artifacts merge cleanly later.
      - name: Upload packaged release as artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.channel }}
          path: Releases/
          if-no-files-found: error

  # All platforms are packed — collect every channel's assets into one folder and publish a
  # single GitHub Release. Sequential uploads (one per channel) mean no create-vs-create race.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Ensure global tools on PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install vpk
        shell: bash
        run: dotnet tool install -g vpk

      - name: Collect all channels into one folder
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: Releases
          merge-multiple: true

      - name: Compute version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # vpk upload --channel selects only that channel's assets from the folder, and each
      # channel's releases.<channel>.json is uniquely named, so the four uploads sit
      # side-by-side in one release. --merge lets channels 2..N attach to the release the
      # first channel created.
      - name: Publish all channels to one GitHub Release
        shell: bash
        run: |
          for ch in win-x64 osx-arm64 linux-x64; do
            vpk upload github \
              --repoUrl https://github.com/Zeejfps/GitBench \
              --token "${{ secrets.GITHUB_TOKEN }}" \
              --channel "$ch" \
              --releaseName "GitBench ${{ steps.ver.outputs.version }}" \
              --tag "${{ github.ref_name }}" \
              --merge \
              --publish
          done
