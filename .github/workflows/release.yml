name: release

# Push a SemVer tag (e.g. v1.2.3) to build + publish a release for every platform.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write          # the publish job uses GITHUB_TOKEN to create/attach release assets

jobs:
  # Build + Velopack-pack each platform on its own runner (Native AOT can't cross-compile),
  # then hand the packaged output to the publish job as an artifact. No job touches GitHub
  # Releases here, so the matrix jobs never race over who creates the release.
  build:
    strategy:
      fail-fast: false     # one platform failing shouldn't abandon the others
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            channel: win-x64
            exe: GitBench.exe
            icon: GitBench/Assets/commit_bench_icon.ico
            extra: ""
          - os: macos-latest          # Apple Silicon runner
            rid: osx-arm64
            channel: osx-arm64
            exe: GitBench
            icon: GitBench/Assets/commit_bench_icon_mac.icns
            extra: "--bundleId com.builtbyzee.gitbench"
          - os: macos-13               # Intel runner
            rid: osx-x64
            channel: osx-x64
            exe: GitBench
            icon: GitBench/Assets/commit_bench_icon_mac.icns
            extra: "--bundleId com.builtbyzee.gitbench"
          - os: ubuntu-latest
            rid: linux-x64
            channel: linux-x64
            exe: GitBench
            icon: GitBench/Assets/commit_bench_icon.png
            extra: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # .gitmodules points at the framework over SSH, but the repo is public — rewrite to
      # HTTPS so the default runner credentials can clone it (no deploy key needed).
      - name: Init public submodule over HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Ensure global tools on PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # Pin vpk to the same version as the Velopack library referenced by the app, so the
      # generated release feed matches what the installed app's UpdateManager expects.
      - name: Install vpk
        shell: bash
        run: dotnet tool install -g vpk --version 1.1.1

      - name: Compute version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"   # v1.2.3 -> 1.2.3

      # vpk pack --icon requires an .icns on macOS; convert the PNG with sips/iconutil
      # (same logic local .app builds use). Windows (.ico) and Linux (.png) need no conversion.
      - name: Generate macOS .icns
        if: runner.os == 'macOS'
        shell: bash
        run: bash GitBench/png-to-icns.sh GitBench/Assets/commit_bench_icon_mac.png GitBench/Assets/commit_bench_icon_mac.icns

      - name: Publish (Native AOT, per-RID)
        shell: bash
        run: >
          dotnet publish GitBench/GitBench.csproj
          -c Release -r ${{ matrix.rid }}
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/${{ matrix.rid }}

      - name: Pack
        shell: bash
        run: >
          vpk pack
          --packId GitBench
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/${{ matrix.rid }}
          --mainExe ${{ matrix.exe }}
          --packTitle GitBench
          --packAuthors Zeejfps
          --channel ${{ matrix.channel }}
          --runtime ${{ matrix.rid }}
          --icon ${{ matrix.icon }}
          ${{ matrix.extra }}

      # vpk writes per-channel asset names, so the four artifacts merge cleanly later.
      - name: Upload packaged release as artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.channel }}
          path: Releases/
          if-no-files-found: error

  # All platforms are packed — collect every channel's assets into one folder and publish a
  # single GitHub Release with `gh`. We deliberately do NOT use `vpk upload github`: vpk creates
  # the release as a draft then publishes it, and publishing a draft makes GitHub try to create
  # the git tag, which already exists (we pushed it to trigger) -> 422 "tag_name already_exists".
  # `gh release create` instead binds a published release to the existing tag, and `vpk pack`
  # already wrote each channel's releases.<channel>.json feed + installers, so uploading those
  # assets directly is all the app's UpdateManager needs.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect all channels into one folder
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: Releases
          merge-multiple: true

      - name: Compute version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          # Start clean: drop any prior/partial release for this tag (keeps the git tag itself),
          # then create a fresh published release bound to the existing tag.
          gh release delete "$tag" --repo Zeejfps/GitBench --yes 2>/dev/null || true
          gh release create "$tag" \
            --repo Zeejfps/GitBench \
            --title "GitBench ${{ steps.ver.outputs.version }}" \
            --generate-notes
          # Upload every packaged asset (nupkgs, installers, portable, releases.<channel>.json),
          # excluding vpk's local build metadata which the update feed doesn't reference.
          mapfile -t files < <(find Releases -type f ! -name 'assets.*.json')
          printf 'Uploading: %s\n' "${files[@]}"
          gh release upload "$tag" "${files[@]}" --repo Zeejfps/GitBench --clobber
